<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus OSINT | Advanced Intelligence Framework</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome.com/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-main: #09090b;
            --bg-card: #18181b;
            --border-color: #27272a;
            --accent-blue: #3b82f6;
            --accent-purple: #a855f7;
            --accent-emerald: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: #fafafa;
            transition: background-color 0.3s ease;
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .glass {
            background: rgba(24, 24, 27, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
        }
        .neon-blue {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.4);
        }
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .progress-bar {
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            border-color: #3f3f46;
            background: rgba(39, 39, 42, 0.8);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-blue-500/30">
    <nav class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-zinc-800">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-shield-halved text-white text-lg"></i>
            </div>
            <span class="text-xl font-bold tracking-tight uppercase gradient-text">Nexus OSINT</span>
        </div>
        
        <div class="hidden lg:flex items-center gap-1 text-sm font-medium">
            <a href="/" class="px-4 py-2 rounded-lg hover:bg-zinc-800 transition-colors">Dashboard</a>
            <a href="/ip-lookup" class="px-4 py-2 rounded-lg hover:bg-zinc-800 transition-colors">IP Intelligence</a>
            <a href="/domain-lookup" class="px-4 py-2 rounded-lg hover:bg-zinc-800 transition-colors">Domain</a>
            <a href="/identity-lookup" class="px-4 py-2 rounded-lg hover:bg-zinc-800 transition-colors">Identity</a>
            <a href="/email-lookup" class="px-4 py-2 rounded-lg hover:bg-zinc-800 transition-colors">Email</a>
            <a href="/phone-lookup" class="px-4 py-2 rounded-lg hover:bg-zinc-800 transition-colors">Phone</a>
            <a href="/stats" class="px-4 py-2 rounded-lg hover:bg-zinc-800 transition-colors">Telemetry</a>
        </div>

        <div class="flex items-center gap-4">
            <div id="sys-status" class="text-[10px] mono px-3 py-1.5 rounded-full bg-zinc-900 border border-zinc-800 text-zinc-400 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                SYS: <span id="ram-stat">--</span>
            </div>
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>

    <footer class="glass border-t border-zinc-800 py-8 text-center">
        <div class="flex justify-center gap-6 mb-4 text-zinc-500 text-sm">
            <a href="#" class="hover:text-zinc-300 transition-colors">Terms of Service</a>
            <a href="#" class="hover:text-zinc-300 transition-colors">Privacy Policy</a>
            <a href="#" class="hover:text-zinc-300 transition-colors">Documentation</a>
        </div>
        <p class="text-zinc-600 text-xs mono uppercase tracking-widest">
            &copy; 2026 Nexus Intelligence Framework | Render Optimized | v1.1.0-stable
        </p>
    </footer>

    <script>
        async function updateSystemStats() {
            try {
                const res = await fetch('/api/system-stats');
                const data = await res.json();
                // Use process_ram for the header to show exact app usage
                document.getElementById('ram-stat').innerText = `${data.process_ram}MB / ${data.ram_limit}MB (${data.ram_percent}%)`;
                if (data.ram_percent > 80) {
                    document.getElementById('ram-stat').classList.add('text-red-500');
                } else {
                    document.getElementById('ram-stat').classList.remove('text-red-500');
                }
            } catch (e) {
                console.error("Stats error", e);
            }
        }
        setInterval(updateSystemStats, 5000);
        updateSystemStats();

        function showProgress(id, callback) {
            const bar = document.getElementById(id + '-bar');
            const text = document.getElementById(id + '-text');
            let width = 0;
            const interval = setInterval(() => {
                if (width < 90) {
                    width += Math.random() * 15;
                    bar.style.width = width + '%';
                    text.innerText = `Analyzing... ${Math.round(width)}%`;
                }
            }, 200);

            callback().then(() => {
                clearInterval(interval);
                bar.style.width = '100%';
                text.innerText = 'Complete!';
                setTimeout(() => {
                    bar.style.width = '0%';
                    text.innerText = 'Ready';
                }, 2000);
            });
        }
    </script>
</body>
</html>
