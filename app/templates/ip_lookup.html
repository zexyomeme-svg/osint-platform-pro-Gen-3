{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-bold mb-2">IP <span class="text-blue-500">Intelligence</span></h1>
        <p class="text-zinc-400">Retrieve geolocation, network, and reputation data for a specific IP address.</p>
    </div>

    <div class="glass p-6 rounded-2xl mb-8">
        <div class="flex flex-col md:flex-row gap-4">
            <input type="text" id="ip-input" placeholder="Enter IP Address (e.g. 8.8.8.8)" 
                   class="flex-grow bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 mono">
            <button onclick="runIpLookup()" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-lg font-bold transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-magnifying-glass"></i> Analyze IP
            </button>
        </div>
        
        <div class="mt-6">
            <div class="flex justify-between text-xs mono text-zinc-500 mb-2">
                <span id="progress-text">Ready</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="w-full bg-zinc-800 h-1.5 rounded-full overflow-hidden">
                <div id="progress-bar" class="progress-bar bg-blue-500 h-full w-0"></div>
            </div>
        </div>
    </div>

    <div id="results" class="hidden space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-6 rounded-2xl border-l-4 border-blue-500">
                <div class="text-zinc-500 text-xs uppercase font-bold mb-1">Location</div>
                <div id="res-location" class="text-xl font-bold">--</div>
            </div>
            <div class="glass p-6 rounded-2xl border-l-4 border-purple-500">
                <div class="text-zinc-500 text-xs uppercase font-bold mb-1">ISP / Org</div>
                <div id="res-isp" class="text-xl font-bold">--</div>
            </div>
            <div class="glass p-6 rounded-2xl border-l-4 border-emerald-500">
                <div class="text-zinc-500 text-xs uppercase font-bold mb-1">Timezone</div>
                <div id="res-tz" class="text-xl font-bold">--</div>
            </div>
        </div>

        <div class="glass p-6 rounded-2xl">
            <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-list text-blue-500"></i> Detailed Network Intelligence
            </h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm mono">
                    <thead>
                        <tr class="text-zinc-500 border-b border-zinc-800">
                            <th class="pb-3 font-medium">Parameter</th>
                            <th class="pb-3 font-medium">Value</th>
                        </tr>
                    </thead>
                    <tbody id="res-table" class="text-zinc-300">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    async function runIpLookup() {
        const ip = document.getElementById('ip-input').value;
        if (!ip) return alert("Please enter an IP address");

        const resultsDiv = document.getElementById('results');
        resultsDiv.classList.add('hidden');

        showProgress('progress', async () => {
            const res = await fetch(`/api/ip/${ip}`);
            const data = await res.json();
            
            if (data.error) {
                alert("Error: " + data.error);
                return;
            }

            document.getElementById('res-location').innerText = `${data.city}, ${data.country}`;
            document.getElementById('res-isp').innerText = data.isp;
            document.getElementById('res-tz').innerText = data.timezone;

            const table = document.getElementById('res-table');
            table.innerHTML = '';
            for (const [key, value] of Object.entries(data)) {
                table.innerHTML += `
                    <tr class="border-b border-zinc-800/50">
                        <td class="py-3 text-zinc-500">${key}</td>
                        <td class="py-3 font-bold text-blue-400">${value}</td>
                    </tr>
                `;
            }
            resultsDiv.classList.remove('hidden');
        });
    }
</script>
{% endblock %}
