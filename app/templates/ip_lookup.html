{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-10">
        <h1 class="text-4xl font-bold mb-3">IP <span class="text-blue-500">Intelligence</span></h1>
        <p class="text-zinc-400 text-lg">Comprehensive geolocation and network reputation analysis.</p>
    </div>

    <div class="glass p-8 rounded-3xl mb-10 neon-blue">
        <div class="flex flex-col md:flex-row gap-4">
            <div class="relative flex-grow">
                <i class="fa-solid fa-location-dot absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>
                <input type="text" id="ip-input" placeholder="Enter IP Address (e.g. 8.8.8.8)" 
                       class="w-full pl-12 pr-4 py-4 bg-zinc-900 border border-zinc-800 rounded-2xl focus:outline-none focus:border-blue-500 mono text-lg transition-all">
            </div>
            <button onclick="runIpLookup()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-3 shadow-lg shadow-blue-600/20">
                <i class="fa-solid fa-magnifying-glass"></i> Analyze
            </button>
        </div>
        
        <div class="mt-8">
            <div class="flex justify-between text-xs mono text-zinc-500 mb-3">
                <span id="progress-text" class="uppercase tracking-widest">Ready</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="w-full bg-zinc-800 h-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="progress-bar bg-blue-500 h-full w-0"></div>
            </div>
        </div>
    </div>

    <div id="results" class="hidden space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass p-6 rounded-3xl border-l-4 border-blue-500">
                <div class="text-zinc-500 text-[10px] uppercase font-bold mb-2 tracking-widest">Geolocation</div>
                <div id="res-location" class="text-xl font-bold truncate">--</div>
            </div>
            <div class="glass p-6 rounded-3xl border-l-4 border-purple-500">
                <div class="text-zinc-500 text-[10px] uppercase font-bold mb-2 tracking-widest">Network / ISP</div>
                <div id="res-isp" class="text-xl font-bold truncate">--</div>
            </div>
            <div class="glass p-6 rounded-3xl border-l-4 border-emerald-500">
                <div class="text-zinc-500 text-[10px] uppercase font-bold mb-2 tracking-widest">Timezone</div>
                <div id="res-tz" class="text-xl font-bold truncate">--</div>
            </div>
        </div>

        <div class="glass p-8 rounded-3xl">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-3">
                <i class="fa-solid fa-list-check text-blue-500"></i> Detailed Network Profile
            </h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm mono">
                    <thead>
                        <tr class="text-zinc-500 border-b border-zinc-800">
                            <th class="pb-4 font-medium uppercase tracking-wider">Attribute</th>
                            <th class="pb-4 font-medium uppercase tracking-wider">Intelligence Value</th>
                        </tr>
                    </thead>
                    <tbody id="res-table" class="text-zinc-300">
                        <!-- Rows injected here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    async function runIpLookup() {
        const ip = document.getElementById('ip-input').value;
        if (!ip) return alert("Please enter an IP address");

        const resultsDiv = document.getElementById('results');
        resultsDiv.classList.add('hidden');

        showProgress('progress', async () => {
            const res = await fetch(`/api/ip/${ip}`);
            const data = await res.json();
            
            if (data.error) {
                alert("Error: " + data.error);
                return;
            }

            document.getElementById('res-location').innerText = `${data.city}, ${data.country}`;
            document.getElementById('res-isp').innerText = data.isp;
            document.getElementById('res-tz').innerText = data.timezone;

            const table = document.getElementById('res-table');
            table.innerHTML = '';
            for (const [key, value] of Object.entries(data)) {
                table.innerHTML += `
                    <tr class="border-b border-zinc-800/50 hover:bg-zinc-800/30 transition-colors">
                        <td class="py-4 text-zinc-500 font-medium">${key}</td>
                        <td class="py-4 font-bold text-blue-400">${value}</td>
                    </tr>
                `;
            }
            resultsDiv.classList.remove('hidden');
        });
    }
</script>
{% endblock %}
