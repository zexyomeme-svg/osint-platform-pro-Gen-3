{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-10">
        <h1 class="text-4xl font-bold mb-3">Kicom <span class="text-blue-500">Intelligence</span></h1>
        <p class="text-zinc-400 text-lg">High-performance open source malware detection using the KicomAV engine.</p>
    </div>

    <div class="glass p-8 rounded-3xl mb-10 neon-blue" style="border-color: rgba(59, 130, 246, 0.4); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);">
        <div class="space-y-6">
            <div class="relative">
                <i class="fa-solid fa-server absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>
                <input type="text" id="server-url" placeholder="KicomAV Server URL (e.g. http://localhost:8311)" 
                       class="w-full pl-12 pr-4 py-4 bg-zinc-900 border border-zinc-800 rounded-2xl focus:outline-none focus:border-blue-500 mono text-sm transition-all">
            </div>
            <div class="flex flex-col md:flex-row gap-4">
                <div class="relative flex-grow">
                    <i class="fa-solid fa-file-shield absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>
                    <input type="file" id="file-input" class="hidden">
                    <label for="file-input" class="flex items-center gap-3 w-full pl-12 pr-4 py-4 bg-zinc-900 border border-zinc-800 rounded-2xl cursor-pointer hover:border-blue-500 transition-all mono text-zinc-400">
                        <span id="file-name">Select a file to scan...</span>
                    </label>
                </div>
                <button onclick="runKicomScan()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-3 shadow-lg shadow-blue-600/20">
                    <i class="fa-solid fa-magnifying-glass"></i> Scan File
                </button>
            </div>
        </div>
        
        <div class="mt-8">
            <div class="flex justify-between text-xs mono text-zinc-500 mb-3">
                <span id="progress-text" class="uppercase tracking-widest">Ready</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="w-full bg-zinc-800 h-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="progress-bar bg-blue-500 h-full w-0"></div>
            </div>
        </div>
    </div>

    <div id="results" class="hidden space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
        <div class="glass p-8 rounded-3xl text-center border-b-8 transition-all" id="status-card">
            <div id="status-icon" class="text-7xl mb-6"></div>
            <h2 id="status-text" class="text-3xl font-bold mb-3"></h2>
            <p id="status-desc" class="text-zinc-400 text-lg max-w-md mx-auto"></p>
        </div>

        <div class="glass p-8 rounded-3xl">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-3">
                <i class="fa-solid fa-list-check text-blue-500"></i> Scan Details
            </h3>
            <div id="detection-list" class="space-y-3 mono text-sm">
                <!-- Details injected here -->
            </div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const fileNameDisplay = document.getElementById('file-name');
    
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            fileNameDisplay.innerText = e.target.files[0].name;
            fileNameDisplay.classList.add('text-zinc-200');
        }
    });

    async function runKicomScan() {
        const file = fileInput.files[0];
        const serverUrl = document.getElementById('server-url').value || "http://localhost:8311";
        if (!file) return alert("Please select a file");

        const resultsDiv = document.getElementById('results');
        resultsDiv.classList.add('hidden');

        showProgress('progress', async () => {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('server_url', serverUrl);

            const res = await fetch('/api/kicom-scan', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();

            if (data.error) {
                alert(data.error);
                return;
            }

            // KicomAV returns a result object. We check for 'infected' or 'clean'
            const isClean = data.result === 'clean' || data.status === 'clean';
            
            const icon = document.getElementById('status-icon');
            const text = document.getElementById('status-text');
            const desc = document.getElementById('status-desc');
            const card = document.getElementById('status-card');
            const list = document.getElementById('detection-list');

            if (!isClean) {
                icon.innerText = '⚠️';
                text.innerText = 'Threat Detected';
                text.className = 'text-3xl font-bold mb-3 text-red-500';
                desc.innerText = 'The KicomAV engine has identified this file as malicious.';
                card.className = 'glass p-12 rounded-3xl text-center border-b-8 border-red-500';
            } else {
                icon.innerText = '✅';
                text.innerText = 'File Clean';
                text.className = 'text-3xl font-bold mb-3 text-emerald-500';
                desc.innerText = 'No threats were detected by the KicomAV engine.';
                card.className = 'glass p-12 rounded-3xl text-center border-b-8 border-emerald-500';
            }

            list.innerHTML = `
                <div class="p-4 bg-zinc-900 rounded-xl border border-zinc-800 flex justify-between items-center">
                    <span class="text-zinc-500">Detection Result:</span>
                    <span class="font-bold ${isClean ? 'text-emerald-400' : 'text-red-400'}">${data.result || data.status}</span>
                </div>
                <div class="p-4 bg-zinc-900 rounded-xl border border-zinc-800 flex justify-between items-center">
                    <span class="text-zinc-500">Scanner Engine:</span>
                    <span class="font-bold text-zinc-200">KicomAV v0.41+</span>
                </div>
            `;

            resultsDiv.classList.remove('hidden');
        });
    }
</script>
{% endblock %}
