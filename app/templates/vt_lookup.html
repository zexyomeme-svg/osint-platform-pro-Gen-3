{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-10">
        <h1 class="text-4xl font-bold mb-3">Virus<span class="text-red-500">Total</span> Intelligence</h1>
        <p class="text-zinc-400 text-lg">Scan files against 70+ antivirus engines to detect malware and threats.</p>
    </div>

    <div class="glass p-8 rounded-3xl mb-10 neon-blue" style="border-color: rgba(239, 68, 68, 0.4); box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);">
        <div class="space-y-6">
            <div class="relative">
                <i class="fa-solid fa-key absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>
                <input type="password" id="api-key" placeholder="VirusTotal API Key (Optional if set in env)" 
                       class="w-full pl-12 pr-4 py-4 bg-zinc-900 border border-zinc-800 rounded-2xl focus:outline-none focus:border-red-500 mono text-sm transition-all">
            </div>
            <div class="flex flex-col md:flex-row gap-4">
                <div class="relative flex-grow">
                    <i class="fa-solid fa-file-shield absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>
                    <input type="file" id="file-input" class="hidden">
                    <label for="file-input" class="flex items-center gap-3 w-full pl-12 pr-4 py-4 bg-zinc-900 border border-zinc-800 rounded-2xl cursor-pointer hover:border-red-500 transition-all mono text-zinc-400">
                        <span id="file-name">Select a file to scan...</span>
                    </label>
                </div>
                <button onclick="runVTScan()" class="bg-red-600 hover:bg-red-500 text-white px-8 py-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-3 shadow-lg shadow-red-600/20">
                    <i class="fa-solid fa-magnifying-glass"></i> Scan File
                </button>
            </div>
        </div>
        
        <div class="mt-8">
            <div class="flex justify-between text-xs mono text-zinc-500 mb-3">
                <span id="progress-text" class="uppercase tracking-widest">Ready</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="w-full bg-zinc-800 h-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="progress-bar bg-red-500 h-full w-0"></div>
            </div>
        </div>
    </div>

    <div id="results" class="hidden space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
        <div class="glass p-8 rounded-3xl text-center border-b-8 transition-all" id="status-card">
            <div id="status-icon" class="text-7xl mb-6"></div>
            <h2 id="status-text" class="text-3xl font-bold mb-3"></h2>
            <p id="status-desc" class="text-zinc-400 text-lg max-w-md mx-auto"></p>
        </div>

        <div class="glass p-8 rounded-3xl">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-3">
                <i class="fa-solid fa-list-check text-red-500"></i> Engine Detections
            </h3>
            <div id="detection-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 mono text-sm">
                <!-- Detection rows -->
            </div>
        </div>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const fileNameDisplay = document.getElementById('file-name');
    
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            fileNameDisplay.innerText = e.target.files[0].name;
            fileNameDisplay.classList.add('text-zinc-200');
        }
    });

    async function runVTScan() {
        const file = fileInput.files[0];
        const apiKey = document.getElementById('api-key').value;
        if (!file) return alert("Please select a file");

        const resultsDiv = document.getElementById('results');
        resultsDiv.classList.add('hidden');

        showProgress('progress', async () => {
            const formData = new FormData();
            formData.append('file', file);
            if (apiKey) formData.append('api_key', apiKey);

            const uploadRes = await fetch('/api/vt-upload', {
                method: 'POST',
                body: formData
            });
            const uploadData = await uploadRes.json();

            if (uploadData.error) {
                alert(uploadData.error);
                return;
            }

            const analysisId = uploadData.analysis_id;
            let report = null;
            
            // Polling for results
            while (!report) {
                const reportRes = await fetch(`/api/vt-report/${analysisId}?api_key=${apiKey}`);
                const reportData = await reportRes.json();
                
                if (reportData.error) {
                    alert(reportData.error);
                    return;
                }
                
                if (reportData.data.attributes.status === 'completed') {
                    report = reportData.data.attributes.results;
                } else {
                    await new Promise(r => setTimeout(r, 3000)); // Wait 3 seconds
                }
            }

            // Process Report
            const detections = Object.entries(report).filter(([_, res]) => res.category === 'malicious');
            const totalEngines = Object.keys(report).length;
            const maliciousCount = detections.length;

            const icon = document.getElementById('status-icon');
            const text = document.getElementById('status-text');
            const desc = document.getElementById('status-desc');
            const card = document.getElementById('status-card');
            const list = document.getElementById('detection-list');

            if (maliciousCount > 0) {
                icon.innerText = '⚠️';
                text.innerText = 'Threat Detected';
                text.className = 'text-3xl font-bold mb-3 text-red-500';
                desc.innerText = `${maliciousCount} of ${totalEngines} engines flagged this file as malicious.`;
                card.className = 'glass p-12 rounded-3xl text-center border-b-8 border-red-500';
            } else {
                icon.innerText = '✅';
                text.innerText = 'File Clean';
                text.className = 'text-3xl font-bold mb-3 text-emerald-500';
                desc.innerText = `All ${totalEngines} engines found no threats in this file.`;
                card.className = 'glass p-12 rounded-3xl text-center border-b-8 border-emerald-500';
            }

            list.innerHTML = detections.map(([engine, res]) => `
                <div class="p-3 bg-zinc-900 rounded-xl border border-red-900/30 flex justify-between items-center">
                    <span class="font-bold text-zinc-300">${engine}</span>
                    <span class="text-red-500 text-[10px] uppercase font-bold">${res.result}</span>
                </div>
            `).join('') || '<div class="text-zinc-600 italic col-span-2 text-center">No malicious detections found.</div>';

            resultsDiv.classList.remove('hidden');
        });
    }
</script>
{% endblock %}
