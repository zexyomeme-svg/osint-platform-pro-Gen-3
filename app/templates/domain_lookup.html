{% extends "base.html" %}
{% block content %}
<div class="max-w-5xl mx-auto">
    <div class="mb-8">
        <h1 class="text-3xl font-bold mb-2">Domain <span class="text-purple-500">Intelligence</span></h1>
        <p class="text-zinc-400">Analyze WHOIS data, DNS records, and surface-level asset information.</p>
    </div>

    <div class="glass p-6 rounded-2xl mb-8">
        <div class="flex flex-col md:flex-row gap-4">
            <input type="text" id="domain-input" placeholder="Enter Domain (e.g. google.com)" 
                   class="flex-grow bg-zinc-900 border border-zinc-700 rounded-lg px-4 py-3 focus:outline-none focus:border-purple-500 mono">
            <button onclick="runDomainLookup()" class="bg-purple-600 hover:bg-purple-500 text-white px-6 py-3 rounded-lg font-bold transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-magnifying-glass"></i> Analyze Domain
            </button>
        </div>
        
        <div class="mt-6">
            <div class="flex justify-between text-xs mono text-zinc-500 mb-2">
                <span id="progress-text">Ready</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="w-full bg-zinc-800 h-1.5 rounded-full overflow-hidden">
                <div id="progress-bar" class="progress-bar bg-purple-500 h-full w-0"></div>
            </div>
        </div>
    </div>

    <div id="results" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-6">
        <!-- WHOIS Section -->
        <div class="glass p-6 rounded-2xl border-t-4 border-purple-500">
            <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-id-card text-purple-500"></i> WHOIS Information
            </h3>
            <div id="whois-data" class="space-y-3 text-sm mono">
                <!-- WHOIS rows -->
            </div>
        </div>

        <!-- DNS Section -->
        <div class="glass p-6 rounded-2xl border-t-4 border-blue-500">
            <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-server text-blue-500"></i> DNS Records
            </h3>
            <div id="dns-data" class="space-y-4">
                <!-- DNS groups -->
            </div>
        </div>
    </div>
</div>

<script>
    async function runDomainLookup() {
        const domain = document.getElementById('domain-input').value;
        if (!domain) return alert("Please enter a domain");

        const resultsDiv = document.getElementById('results');
        resultsDiv.classList.add('hidden');

        showProgress('progress', async () => {
            const res = await fetch(`/api/domain/${domain}`);
            const data = await res.json();

            if (data.whois.error) {
                alert("Error fetching WHOIS: " + data.whois.error);
                return;
            }

            // Render WHOIS
            const whoisDiv = document.getElementById('whois-data');
            whoisDiv.innerHTML = '';
            for (const [key, value] of Object.entries(data.whois)) {
                whoisDiv.innerHTML += `
                    <div class="flex justify-between border-b border-zinc-800 py-2">
                        <span class="text-zinc-500">${key}</span>
                        <span class="text-zinc-200 font-bold text-right ml-4">${value || 'N/A'}</span>
                    </div>
                `;
            }

            // Render DNS
            const dnsDiv = document.getElementById('dns-data');
            dnsDiv.innerHTML = '';
            for (const [type, records] of Object.entries(data.dns)) {
                const recordsList = records.length > 0 
                    ? records.map(r => `<div class="bg-zinc-900 p-2 rounded border border-zinc-800 text-xs mono mb-1">${r}</div>`).join('')
                    : '<div class="text-zinc-600 text-xs italic">No records found</div>';
                
                dnsDiv.innerHTML += `
                    <div>
                        <div class="text-xs font-bold text-blue-400 uppercase mb-2">${type} Records</div>
                        ${recordsList}
                    </div>
                `;
            }

            resultsDiv.classList.remove('hidden');
        });
    }
</script>
{% endblock %}
