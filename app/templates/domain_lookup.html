{% extends "base.html" %}
{% block content %}
<div class="max-w-6xl mx-auto">
    <div class="mb-10">
        <h1 class="text-4xl font-bold mb-3">Domain <span class="text-purple-500">Intelligence</span></h1>
        <p class="text-zinc-400 text-lg">Advanced WHOIS analysis and DNS record enumeration.</p>
    </div>

    <div class="glass p-8 rounded-3xl mb-10 neon-blue" style="border-color: rgba(168, 85, 247, 0.4); box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);">
        <div class="flex flex-col md:flex-row gap-4">
            <div class="relative flex-grow">
                <i class="fa-solid fa-globe absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"></i>
                <input type="text" id="domain-input" placeholder="Enter Domain (e.g. google.com)" 
                       class="w-full pl-12 pr-4 py-4 bg-zinc-900 border border-zinc-800 rounded-2xl focus:outline-none focus:border-purple-500 mono text-lg transition-all">
            </div>
            <button onclick="runDomainLookup()" class="bg-purple-600 hover:bg-purple-500 text-white px-8 py-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-3 shadow-lg shadow-purple-600/20">
                <i class="fa-solid fa-magnifying-glass"></i> Analyze
            </button>
        </div>
        
        <div class="mt-8">
            <div class="flex justify-between text-xs mono text-zinc-500 mb-3">
                <span id="progress-text" class="uppercase tracking-widest">Ready</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="w-full bg-zinc-800 h-2 rounded-full overflow-hidden">
                <div id="progress-bar" class="progress-bar bg-purple-500 h-full w-0"></div>
            </div>
        </div>
    </div>

    <div id="results" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
        <!-- WHOIS Section -->
        <div class="glass p-8 rounded-3xl border-t-4 border-purple-500">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-3">
                <i class="fa-solid fa-id-card text-purple-500"></i> WHOIS Profile
            </h3>
            <div id="whois-data" class="space-y-4 text-sm mono">
                <!-- WHOIS rows -->
            </div>
        </div>

        <!-- DNS Section -->
        <div class="glass p-8 rounded-3xl border-t-4 border-blue-500">
            <h3 class="text-xl font-bold mb-6 flex items-center gap-3">
                <i class="fa-solid fa-server text-blue-500"></i> DNS Infrastructure
            </h3>
            <div id="dns-data" class="space-y-6">
                <!-- DNS groups -->
            </div>
        </div>
    </div>
</div>

<script>
    async function runDomainLookup() {
        const domain = document.getElementById('domain-input').value;
        if (!domain) return alert("Please enter a domain");

        const resultsDiv = document.getElementById('results');
        resultsDiv.classList.add('hidden');

        showProgress('progress', async () => {
            const res = await fetch(`/api/domain/${domain}`);
            const data = await res.json();

            if (data.whois.error) {
                alert("Error fetching WHOIS: " + data.whois.error);
                return;
            }

            // Render WHOIS
            const whoisDiv = document.getElementById('whois-data');
            whoisDiv.innerHTML = '';
            for (const [key, value] of Object.entries(data.whois)) {
                whoisDiv.innerHTML += `
                    <div class="flex justify-between items-center border-b border-zinc-800 py-3">
                        <span class="text-zinc-500">${key}</span>
                        <span class="text-zinc-200 font-bold text-right ml-4 break-all">${value || 'N/A'}</span>
                    </div>
                `;
            }

            // Render DNS
            const dnsDiv = document.getElementById('dns-data');
            dnsDiv.innerHTML = '';
            for (const [type, records] of Object.entries(data.dns)) {
                const recordsList = records.length > 0 
                    ? records.map(r => `<div class="bg-zinc-900 p-3 rounded-xl border border-zinc-800 text-xs mono mb-2 text-blue-400">${r}</div>`).join('')
                    : '<div class="text-zinc-600 text-xs italic">No records found</div>';
                
                dnsDiv.innerHTML += `
                    <div class="mb-4">
                        <div class="text-xs font-bold text-purple-400 uppercase mb-3 tracking-widest">${type} Records</div>
                        ${recordsList}
                    </div>
                `;
            }

            resultsDiv.classList.remove('hidden');
        });
    }
</script>
{% endblock %}
